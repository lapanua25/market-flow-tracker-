name: Update Financial Data

on:
  schedule:
    - cron: '0 0 * * *' # 毎日UTC0時に実行される設定（日本時間午前9時）
  workflow_dispatch: # 手動実行も可能

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへのプッシュ権限を付与
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas matplotlib
          
      - name: Install Japanese fonts
        run: |
          sudo apt-get install -y fonts-noto-cjk
          
      - name: Run generator script
        run: python generator.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/chart.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update financial data by AI" && git push)
