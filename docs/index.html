<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場資金流動ダッシュボード</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-content">
                <h1>Market Fund Flow</h1>
                <p>市場資金流動ダッシュボード</p>
            </div>
            <button id="refresh-btn" class="refresh-btn" onclick="fetchData()">
                <i class="fa-solid fa-arrows-rotate"></i> 更新
            </button>
        </header>

        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p>データを読み込み中...</p>
        </div>

        <div id="dashboard-content" style="display: none;">
            <div class="last-updated">最終更新: <span id="time-updated">--</span></div>
            
            <div class="timeframe-selector">
                <button class="tf-btn active" data-tf="1D">対前日比</button>
                <button class="tf-btn" data-tf="1W">対前週</button>
                <button class="tf-btn" data-tf="1M">対前月</button>
                <button class="tf-btn" data-tf="1Y">対前年</button>
            </div>
            
            <div class="cards-grid" id="stats-cards"></div>

            <div class="main-widgets">
                <div class="widget chart-card glass-panel">
                    <h2><i class="fa-solid fa-chart-line"></i> 1年間パフォーマンストラッカー</h2>
                    <img id="chart-img" src="" alt="Market Chart">
                </div>
                
                <div class="widget analysis-card glass-panel">
                    <h2><i class="fa-solid fa-brain"></i> 資金流動AI分析</h2>
                    <ul id="analysis-list"></ul>
                </div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
